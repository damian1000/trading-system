version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # Pinned to 2.3.x until CodeQL's Kotlin extractor supports 2.4+
      - dependency-name: "org.jetbrains.kotlin.jvm"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
